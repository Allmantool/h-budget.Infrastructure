events {
    worker_connections 1024;
    multi_accept on;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    log_format custom
        '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" '
        '"$http_user_agent"';

    access_log /var/log/nginx/access.log custom;
    error_log /var/log/nginx/error.log warn;

    proxy_connect_timeout 3s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_intercept_errors on;

    # TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_prefer_server_ciphers off;

    # WebSocket / Upgrade support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Common proxy headers
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # Basic security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Enable only if ALL subdomains are always HTTPS
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ==========================================================
    # HTTP -> HTTPS
    # ==========================================================
    server {
        listen 80 default_server;
        return 301 https://$host$request_uri;
    }

    # ==========================================================
    # MAIN UI (Angular SPA)
    # ==========================================================
    server {
        listen 443 ssl;
        server_name vm2.linux;

        ssl_certificate /etc/ssl/certs/vm2.linux.pem;
        ssl_certificate_key /etc/ssl/private/vm2.linux-key-nopass.pem;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location = /otlp/v1/traces {
            proxy_pass http://gf-alloy:4318/v1/traces;
            proxy_buffering off;
        }

        location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~ /\. {
            deny all;
        }
    }

    # ==========================================================
    # JAEGER
    # ==========================================================
    server {
        listen 443 ssl;
        server_name jaeger.vm2.linux;

        ssl_certificate /etc/ssl/certs/vm2.linux.pem;
        ssl_certificate_key /etc/ssl/private/vm2.linux-key-nopass.pem;

        location / {
            proxy_pass http://jaeger:16686;
        }
    }

    # ==========================================================
    # EVENTSTORE DB
    # ==========================================================
    server {
        listen 443 ssl;
        server_name eventstore.vm2.linux;

        ssl_certificate /etc/ssl/certs/vm2.linux.pem;
        ssl_certificate_key /etc/ssl/private/vm2.linux-key-nopass.pem;

        error_page 502 503 504 = @backend_down;

        location / {
            proxy_pass http://event-store-db:2113;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location @backend_down {
            internal;
            default_type application/json;
            return 503 '{"status":"unavailable"}';
        }
    }

