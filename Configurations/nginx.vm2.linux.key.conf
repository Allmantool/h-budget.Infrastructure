worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    reset_timedout_connection on;
    server_tokens off;

    client_max_body_size 50m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 30s;

    log_format custom
        '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$host"';

    access_log /var/log/nginx/access.log custom;
    error_log /var/log/nginx/error.log warn;

    proxy_http_version 1.1;
    proxy_connect_timeout 3s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_buffering on;
    proxy_buffers 16 16k;
    proxy_buffer_size 16k;
    proxy_busy_buffers_size 32k;
    proxy_intercept_errors on;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_prefer_server_ciphers off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ==========================================================
    # HTTP -> HTTPS
    # ==========================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ==========================================================
    # DEFAULT HTTPS CATCH-ALL
    # ==========================================================
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name _;

        ssl_certificate /etc/ssl/certs/vm2.linux.pem;
        ssl_certificate_key /etc/ssl/private/vm2.linux-key-nopass.pem;

        return 444;
    }

    # ==========================================================
    # MAIN UI (Angular SPA)
    # ==========================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name vm2.linux;

        ssl_certificate /etc/ssl/certs/vm2.linux.pem;
        ssl_certificate_key /etc/ssl/private/vm2.linux-key-nopass.pem;

        root /usr/share/nginx/html;
        index index.html;

        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 'ok';
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location = /otlp/v1/traces {
            set $otlp_backend gf-alloy:4318;
            proxy_pass http://$otlp_backend/v1/traces;
            proxy_buffering off;
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        }

        location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ==========================================================
    # JAEGER
    # ==========================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name jaeger.vm2.linux;

        ssl_certificate /etc/ssl/certs/vm2.linux.pem;
        ssl_certificate_key /etc/ssl/private/vm2.linux-key-nopass.pem;

        error_page 502 503 504 = @backend_down;

        location / {
            set $backend jaeger:16686;
            proxy_pass http://$backend;
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        }

        location @backend_down {
            internal;
            default_type application/json;
            return 503 '{"status":"unavailable"}';
        }
    }

